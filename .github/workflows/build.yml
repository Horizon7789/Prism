name: PRISM Build Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Setup Script
      run: |
        chmod +x setup.sh
        ./setup.sh

    - name: Compile PRISM
      run: make

    - name: Run Basic Health Check
      run: ./prism_ai --version || echo "PRISM built successfully."
